<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paginas Web - Fizoweb</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>

<body>

    <nav id="main-nav" aria-label="Main">
        <div class="logo-nav">
            <img src="./assets/logo-v1.jpg" alt="Marca logo">
            <span>fizweb</span>
        </div>

        <div class="nav-menu" id="navMenu">
            <div class="logo-nav logo-nav__menu">
                <img src="./assets/logo-v1.jpg" alt="Marca logo">
            </div>
            <div class="nav-menu__social">
                <!-- Social links para móvil -->
                <a href="#" class="nav-menu__social-link">
                    <img src="./assets/facebook-icon.svg" alt="Facebook icon">
                </a>
                <a href="#" class="nav-menu__social-link">
                    <img src="./assets/instagram-icon.svg" alt="Instagram icon">
                </a>
            </div>
            <ul class="nav-menu__list">
                <li class="nav-menu__item">
                    <a href="#" class="nav-menu__link">Inicio</a>
                </li>
                <li class="nav-menu__item">
                    <a href="#" class="nav-menu__link">Producto</a>
                </li>
                <li class="nav-menu__item">
                    <a href="#" class="nav-menu__link">Contacto</a>
                </li>

            </ul>
        </div>

        <div class="nav-menu__social nav-menu__social__desktop">
            <!-- Social links para escritorio -->
            <a href="#" class="nav-menu__social-link">
                <img src="./assets/facebook-icon.svg" alt="Facebook icon">
            </a>
            <a href="#" class="nav-menu__social-link">
                <img src="./assets/instagram-icon.svg" alt="Instagram icon">
            </a>
        </div>

        <button class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>


    <section id="home">

        <div class="hero__image">
            <h1>Tu página web, <span>más cerca</span> que nunca.</h1>
            <h2>Mas presencia digital al alcance de todos, eliminando barreras y acercando la web de manera rápida y
                eficiente. </h2>
        </div>


        <!-- Ola SVG más baja, simétrica e invertida -->
        <div class="section__divider">
            <svg viewBox="0 0 1440 50" width="100%" height="50" preserveAspectRatio="none"
                xmlns="http://www.w3.org/2000/svg">
                <path d="M0,20 Q360,50 720,20 T1440,20 L1440,0 L0,0 Z" fill="#f8f9fa" />
            </svg>
        </div>


        <div class="swiper">
            <div class="swiper-wrapper">
                <!-- Las slides se insertan por JS -->
            </div>
            <div class="swiper-pagination"></div>
        </div>
    </section>



    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="main.js"></script>
</body>

</html>
