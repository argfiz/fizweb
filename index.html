<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paginas Web - Fizoweb</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav id="main-nav" aria-label="Main">
        <div class="logo-nav">
            <img src="./assets/logo-v1.jpg" alt="Marca logo">
            <span>fizoweb</span>
        </div>

        <div class="nav-menu" id="navMenu">
            <div class="logo-nav logo-nav__menu">
                <img src="./assets/logo-v1.jpg" alt="Marca logo">
            </div>
            <div class="nav-menu__social">
                <!-- Social links para móvil -->
                <a href="#" class="nav-menu__social-link">
                    <img src="./assets/facebook-icon.svg" alt="Facebook icon">
                </a>
                <a href="#" class="nav-menu__social-link">
                    <img src="./assets/instagram-icon.svg" alt="Instagram icon">
                </a>
            </div>
            <ul class="nav-menu__list">
                <li class="nav-menu__item">
                    <a href="#" class="nav-menu__link">Inicio</a>
                </li>
                <li class="nav-menu__item">
                    <a href="#" class="nav-menu__link">Producto</a>
                </li>
                <li class="nav-menu__item">
                    <a href="#" class="nav-menu__link">Contacto</a>
                </li>

            </ul>
        </div>

        <div class="nav-menu__social nav-menu__social__desktop">
            <!-- Social links para escritorio -->
            <a href="#" class="nav-menu__social-link">
                <img src="./assets/facebook-icon.svg" alt="Facebook icon">
            </a>
            <a href="#" class="nav-menu__social-link">
                <img src="./assets/instagram-icon.svg" alt="Instagram icon">
            </a>
        </div>

        <button class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <script src="main.js"></script>
</body>

</html>
